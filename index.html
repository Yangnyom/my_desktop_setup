<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Desk Setup Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #0a0a1a; color: #fff; }

  #canvas-container { width: 100vw; height: 100vh; display: block; }

  .ui-overlay {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(22, 33, 62, 0.9); backdrop-filter: blur(12px);
    padding: 12px 20px; border-radius: 14px; border: 1px solid rgba(233, 69, 96, 0.3);
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; z-index: 10;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6); max-width: 90vw;
  }
  .ui-overlay button {
    background: rgba(15, 52, 96, 0.8); color: #eee; border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
    transition: 0.2s; white-space: nowrap;
  }
  .ui-overlay button:hover { background: #e94560; border-color: #e94560; transform: translateY(-2px); }
  .ui-overlay .danger { background: rgba(233, 69, 96, 0.3); }
  .ui-overlay .danger:hover { background: #e94560; }

  .info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.3); font-size: 12px; z-index: 10; text-align: center;
    pointer-events: none; letter-spacing: 1px;
  }

  @media (max-width: 600px) {
    .ui-overlay { padding: 10px 12px; gap: 6px; top: 12px; }
    .ui-overlay button { padding: 6px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="ui-overlay" id="toolbar">
  <button onclick="addItem('monitor')">🖥 모니터</button>
  <button onclick="addItem('laptop')">💻 노트북</button>
  <button onclick="addItem('keyboard')">⌨ 키보드</button>
  <button onclick="addItem('mouse')">🖱 마우스</button>
  <button onclick="addItem('speaker')">🔊 스피커</button>
  <button onclick="addItem('lamp')">💡 램프</button>
  <button onclick="addItem('coffee')">☕ 커피</button>
  <button onclick="addItem('tablet')">📟 태블릿</button>
  <button onclick="addItem('plant')">🌵 선인장</button>
  <button onclick="clearAll()" class="danger">🗑 전체삭제</button>
</div>

<div class="info">드래그: 아이템 이동 | 우클릭 드래그: 시점 회전 | 휠: 확대/축소</div>

<div id="canvas-container"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { DragControls } from 'three/addons/controls/DragControls.js';

  const container = document.getElementById('canvas-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);

  const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
  camera.position.set(8, 6, 10);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  container.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.5, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.maxPolarAngle = Math.PI / 2.3;
  controls.minDistance = 3;
  controls.maxDistance = 20;
  controls.update();

  // --- Lighting ---
  const ambient = new THREE.AmbientLight(0x404060, 0.6);
  scene.add(ambient);

  const mainLight = new THREE.DirectionalLight(0xffeedd, 1.8);
  mainLight.position.set(5, 12, 8);
  mainLight.castShadow = true;
  mainLight.shadow.mapSize.width = 2048;
  mainLight.shadow.mapSize.height = 2048;
  mainLight.shadow.camera.near = 0.5;
  mainLight.shadow.camera.far = 30;
  mainLight.shadow.camera.left = -10;
  mainLight.shadow.camera.right = 10;
  mainLight.shadow.camera.top = 10;
  mainLight.shadow.camera.bottom = -10;
  scene.add(mainLight);

  const fillLight = new THREE.DirectionalLight(0x8888ff, 0.5);
  fillLight.position.set(-4, 3, -6);
  scene.add(fillLight);

  const rimLight = new THREE.DirectionalLight(0xffffff, 0.3);
  rimLight.position.set(-3, 1, 5);
  scene.add(rimLight);

  // --- Floor / Room ---
  const floorGeo = new THREE.PlaneGeometry(14, 14);
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0x1a1a2e, roughness: 0.8, metalness: 0.1,
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -0.01;
  floor.receiveShadow = true;
  scene.add(floor);

  const gridHelper = new THREE.GridHelper(14, 20, 0x0f3460, 0x0f3460);
  gridHelper.position.y = 0;
  scene.add(gridHelper);

  // --- Desk ---
  const deskMat = new THREE.MeshStandardMaterial({
    color: 0x2d2d44, roughness: 0.6, metalness: 0.1,
  });
  const deskTop = new THREE.Mesh(new THREE.BoxGeometry(6, 0.15, 3), deskMat);
  deskTop.position.y = 0.6;
  deskTop.castShadow = true;
  deskTop.receiveShadow = true;
  scene.add(deskTop);

  const legMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.7, metalness: 0.3 });
  const legPositions = [[-2.6, -1.2], [2.6, -1.2], [-2.6, 1.2], [2.6, 1.2]];
  legPositions.forEach(([x, z]) => {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6, 8), legMat);
    leg.position.set(x, 0.3, z);
    leg.castShadow = true;
    scene.add(leg);
  });

  // --- Items storage ---
  const items = [];
  let dragControls;

  function createItemMesh(type) {
    const group = new THREE.Group();
    let mat;

    const colors = {
      monitor: 0x3498db, laptop: 0x9b59b6, keyboard: 0x2ecc71, mouse: 0xf1c40f,
      speaker: 0x95a5a6, lamp: 0xe67e22, coffee: 0xa0643c, tablet: 0x34495e,
      plant: 0x27ae60,
    };
    const color = colors[type] || 0xe94560;
    mat = new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.2 });

    switch (type) {
      case 'monitor': {
        const screen = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.7, 0.06), mat);
        screen.position.y = 0.35;
        screen.castShadow = true;
        group.add(screen);
        const stand = new THREE.Mesh(
          new THREE.CylinderGeometry(0.05, 0.08, 0.2, 8),
          new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.5, metalness: 0.6 })
        );
        stand.position.y = 0.1;
        group.add(stand);
        const base = new THREE.Mesh(
          new THREE.BoxGeometry(0.2, 0.03, 0.15),
          new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.5, metalness: 0.6 })
        );
        base.position.y = 0.015;
        group.add(base);
        break;
      }
      case 'laptop': {
        const base = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.04, 0.6), mat);
        base.position.y = 0.02;
        base.castShadow = true;
        group.add(base);
        const screenMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.3, metalness: 0.3 });
        const screen = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.55, 0.03), screenMat);
        screen.position.set(0, 0.3, -0.25);
        screen.rotation.x = -0.3;
        group.add(screen);
        break;
      }
      case 'keyboard': {
        const kb = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.04, 0.25), mat);
        kb.position.y = 0.02;
        kb.castShadow = true;
        group.add(kb);
        const keys = new THREE.Mesh(
          new THREE.BoxGeometry(0.7, 0.03, 0.18),
          new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.6 })
        );
        keys.position.y = 0.045;
        group.add(keys);
        break;
      }
      case 'mouse': {
        const mouse = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), mat);
        mouse.scale.set(1, 0.5, 1.4);
        mouse.position.y = 0.06;
        mouse.castShadow = true;
        group.add(mouse);
        break;
      }
      case 'speaker': {
        const speaker = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.14, 0.3, 16), mat);
        speaker.position.y = 0.15;
        speaker.castShadow = true;
        group.add(speaker);
        const grille = new THREE.Mesh(
          new THREE.CylinderGeometry(0.08, 0.1, 0.02, 16),
          new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.8 })
        );
        grille.position.y = 0.15;
        grille.position.z = 0.12;
        group.add(grille);
        break;
      }
      case 'lamp': {
        const armMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.4, metalness: 0.7 });
        const base = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.03, 12), armMat);
        base.position.y = 0.015;
        group.add(base);
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.025, 0.35, 8), armMat);
        pole.position.y = 0.19;
        group.add(pole);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffdd44, roughness: 0.3, emissive: 0xffdd44, emissiveIntensity: 0.1 });
        const head = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.08, 12), headMat);
        head.position.set(0, 0.38, -0.06);
        head.rotation.x = 0.3;
        group.add(head);
        break;
      }
      case 'coffee': {
        const mug = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.07, 0.12, 12), mat);
        mug.position.y = 0.06;
        mug.castShadow = true;
        group.add(mug);
        const handle = new THREE.Mesh(
          new THREE.TorusGeometry(0.04, 0.015, 8, 12, Math.PI),
          new THREE.MeshStandardMaterial({ color: 0xa0643c, roughness: 0.6 })
        );
        handle.position.set(0.09, 0.08, 0);
        handle.rotation.z = Math.PI / 2;
        group.add(handle);
        break;
      }
      case 'tablet': {
        const tab = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.02, 0.35), mat);
        tab.position.y = 0.01;
        tab.castShadow = true;
        group.add(tab);
        const screenMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.2 });
        const screen = new THREE.Mesh(new THREE.BoxGeometry(0.44, 0.01, 0.29), screenMat);
        screen.position.y = 0.025;
        group.add(screen);
        break;
      }
      case 'plant': {
        const potMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.7 });
        const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.08, 0.12, 8), potMat);
        pot.position.y = 0.06;
        group.add(pot);
        const leaves = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), mat);
        leaves.position.y = 0.16;
        leaves.scale.set(1, 0.8, 1);
        group.add(leaves);
        const leaf2 = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), mat);
        leaf2.position.set(0.06, 0.2, 0.06);
        group.add(leaf2);
        break;
      }
    }

    // Shadow for all items
    group.children.forEach(child => {
      if (child.isMesh) child.receiveShadow = true;
    });

    return group;
  }

  function addItem(type) {
    const group = createItemMesh(type);
    group.userData.isDragable = true;
    group.userData.type = type;
    group.traverse(child => { if (child.isMesh) child.userData.isDragable = true; });

    const deskW = 5.5, deskZ = 2.5;
    const x = (Math.random() - 0.5) * deskW;
    const z = (Math.random() - 0.5) * deskZ;
    group.position.set(x, 0.68, z);
    scene.add(group);
    items.push(group);

    // Re-init drag controls
    initDragControls();
  }

  function initDragControls() {
    if (dragControls) {
      dragControls.dispose();
    }
    dragControls = new DragControls(items, camera, renderer.domElement);
    dragControls.addEventListener('dragstart', e => {
      controls.enabled = false;
      e.object.position.y = 1.0;
    });
    dragControls.addEventListener('drag', e => {
      // Constrain to desk surface
      const halfW = 2.8, halfZ = 1.35;
      e.object.position.x = Math.max(-halfW, Math.min(halfW, e.object.position.x));
      e.object.position.z = Math.max(-halfZ, Math.min(halfZ, e.object.position.z));
    });
    dragControls.addEventListener('dragend', e => {
      controls.enabled = true;
      e.object.position.y = 0.68;
    });
  }

  window.addItem = addItem;

  window.clearAll = function() {
    items.forEach(item => scene.remove(item));
    items.length = 0;
    if (dragControls) dragControls.dispose();
    dragControls = null;
  };

  // --- Resize ---
  window.addEventListener('resize', () => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });

  // --- Animate ---
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>
